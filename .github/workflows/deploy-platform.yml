# ppos-build-orchestrator/.github/workflows/deploy-platform.yml
name: Deploy PrintPrice OS Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Deploy to Cloud
        run: npm run deploy:staging
